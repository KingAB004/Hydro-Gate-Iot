<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFWMS Alerts Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --priority-high-bg: #FEE2E2;
            --priority-high-tag: #EF4444;
            --priority-medium-bg: #FEF9C3;
            --priority-medium-tag: #EAB308;
            --priority-info-bg: #E0F2FE;
            --priority-info-tag: #3B82F6;
            --priority-low-bg: #DCFCE7;
            --priority-low-tag: #22C55E;

            --text-dark: #1E293B;
            --text-muted: #64748B;
            --bg-light: #F8FAFC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #E2E8F0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .phone-container {
            width: 100%;
            max-width: 414px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
            border: 8px solid #1E293B;
            display: flex;
            flex-direction: column;
            aspect-ratio: 9/19.5;
        }

        .notch {
            height: 30px;
            background: #1E293B;
            width: 50%;
            margin: 0 auto;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .content {
            flex: 1;
            padding: 50px 20px 20px;
            overflow-y: auto;
            background: #F8FAFC;
        }

        .header {
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            color: var(--text-dark);
            font-size: 20px;
            cursor: pointer;
            border: none;
        }

        .header-text h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.2;
        }

        .header-text p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .alerts-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Alert Card Styles */
        .alert-card {
            border-radius: 24px;
            padding: 20px;
            position: relative;
            display: flex;
            gap: 16px;
            transition: transform 0.2s ease, opacity 0.3s ease;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-card.high {
            background: var(--priority-high-bg);
        }

        .alert-card.medium {
            background: var(--priority-medium-bg);
        }

        .alert-card.info {
            background: var(--priority-info-bg);
        }

        .alert-card.low {
            background: var(--priority-low-bg);
        }

        .icon-container {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .high .icon-container {
            color: var(--priority-high-tag);
        }

        .medium .icon-container {
            color: var(--priority-medium-tag);
        }

        .info .icon-container {
            color: var(--priority-info-tag);
        }

        .low .icon-container {
            color: var(--priority-low-tag);
        }

        .card-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .alert-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            flex: 1;
        }

        .priority-tag {
            padding: 2px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
        }

        .high .priority-tag {
            background: var(--priority-high-tag);
        }

        .medium .priority-tag {
            background: var(--priority-medium-tag);
        }

        .info .priority-tag {
            background: var(--priority-info-tag);
        }

        .low .priority-tag {
            background: var(--priority-low-tag);
        }

        .alert-body {
            font-size: 13px;
            color: #475569;
            line-height: 1.5;
        }

        .alert-footer {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .meta-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #94A3B8;
        }

        /* Simulation Controls */
        .sim-controls {
            background: #1E293B;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .sim-btn {
            padding: 10px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .sim-btn:hover {
            opacity: 0.9;
        }

        .btn-add-high {
            background: var(--priority-high-tag);
        }

        .btn-add-medium {
            background: var(--priority-medium-tag);
        }

        .btn-add-info {
            background: var(--priority-info-tag);
        }

        .btn-add-low {
            background: var(--priority-low-tag);
        }

        .btn-clear {
            background: #475569;
            grid-column: span 2;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div class="phone-container">
        <div class="notch"></div>

        <div class="content">
            <div class="header">
                <button class="back-btn" onclick="alert('Navigation is disabled in simulation mode.')">‹</button>
                <div class="header-text">
                    <h1>Alerts</h1>
                    <p>Recent notifications and warnings</p>
                </div>
            </div>

            <div id="alerts-container" class="alerts-list">
                <!-- Alert Cards will be added here -->
            </div>
        </div>

        <div class="sim-controls">
            <button onclick="addAlert('high')" class="sim-btn btn-add-high">+ High</button>
            <button onclick="addAlert('medium')" class="sim-btn btn-add-medium">+ Medium</button>
            <button onclick="addAlert('info')" class="sim-btn btn-add-info">+ Info</button>
            <button onclick="addAlert('low')" class="sim-btn btn-add-low">+ Low</button>
            <button onclick="clearAlerts()" class="sim-btn btn-clear">Clear All</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('alerts-container');

        const alertTemplates = {
            high: {
                title: "High Water Level Alert",
                body: "Water level reached 18.2m at Marikina River. Critical threshold exceeded. Automated systems active.",
                icon: "⚠",
                location: "Marikina River - Tumana"
            },
            medium: {
                title: "Rising Water Level",
                body: "Water level increasing at 0.3m/hour. Continue monitoring and move valuables to higher ground.",
                icon: "⚠",
                location: "Pasig River - C5 Area"
            },
            info: {
                title: "Weather Advisory",
                body: "Heavy rainfall expected in the next 6 hours. Monitor water levels closely for changes.",
                icon: "ⓘ",
                location: "PAGASA Weather Bureau"
            },
            low: {
                title: "Water Level Stable",
                body: "Manggahan Floodway levels stable at 6.5m. Normal operations confirmed.",
                icon: "✓",
                location: "Manggahan Floodway"
            }
        };

        function addAlert(type) {
            const data = alertTemplates[type];
            const card = document.createElement('div');
            card.className = `alert-card ${type}`;

            const now = new Date();
            const timeStr = "Just now";

            card.innerHTML = `
            <div class="icon-container">${data.icon}</div>
            <div class="card-main">
                <div class="card-header">
                    <h3 class="alert-title">${data.title}</h3>
                    <span class="priority-tag">${type}</span>
                </div>
                <p class="alert-body">${data.body}</p>
                <div class="alert-footer">
                    <span>🕒 ${timeStr}</span>
                    <div class="meta-dot"></div>
                    <span>${data.location}</span>
                </div>
            </div>
        `;

            container.prepend(card);
        }

        function clearAlerts() {
            container.innerHTML = '<div class="empty-state">No recent notifications.</div>';
        }

        function init() {
            // Initial set of alerts matching reference
            addAlert('low');
            addAlert('info');
            addAlert('medium');
            addAlert('high');
        }

        init();
    </script>

</body>

</html>
